<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정부대전청사 공무원노조연합회</title>
    
    <style>
        /* 1. 전체 배경 설정 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 배경이 흔들리지 않게 고정 */
        }

        body {
            /* 배경 이미지 설정 (폰에서도 꽉 차게) */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('배경.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Noto Sans KR", sans-serif;
        }

        /* 2. 중앙 박스 설정 (반응형) */
        .box {
            background: rgba(0, 0, 0, 0.7); /* 어두운 투명 배경 */
            backdrop-filter: blur(5px); /* 배경을 살짝 흐리게 해서 고급스럽게 */
            padding: 40px 30px;
            border-radius: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            
            /* [핵심] 폰에서는 화면의 85%, PC에서는 최대 400px */
            width: 85%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            word-break: keep-all; /* 단어가 잘리지 않게 함 */
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }

        /* 3. 입력창 및 버튼 (폰에서 터치하기 편하게) */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px; /* 아이폰에서 자동 줌 방지 */
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff5252;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active {
            background-color: #e04040;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>정부대전청사 공무원노조연합회</h2>
        <p>비밀번호를 입력하여 접속하세요.</p>
        <input type="password" placeholder="비밀번호 입력">
        <button onclick="checkPassword()">확인</button>
    </div>

    <script>
        function checkPassword() {
            // 여기에 비밀번호 로직을 넣으실 수 있습니다.
            alert("확인 버튼이 클릭되었습니다.");
        }
    </script>

</body>
</html>
