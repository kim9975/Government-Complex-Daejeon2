<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정부대전청사 공무원노조연합회</title>
    
    <style>
        /* 1. 배경 및 전체 레이아웃 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 스크롤 방지 */
        }

        body {
            /* 배경 이미지 설정: 어둡게 처리하여 글씨 가독성 확보 */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('배경.png') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Noto Sans KR", sans-serif;
        }

        /* 2. 중앙 로그인 박스 (모바일 여백 강조 버전) */
        .box {
            background: rgba(0, 0, 0, 0.7); /* 반투명 검정 */
            backdrop-filter: blur(8px); /* 배경 흐림 효과 추가 */
            padding: 45px 25px;
            border-radius: 25px;
            color: white;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            
            /* [여백 설정] 폰 화면 가로의 75%만 차지하여 양옆 여백 확보 */
            width: 75%;
            max-width: 380px; 
            box-sizing: border-box;
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            word-break: keep-all;
            line-height: 1.4;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        /* 3. 입력창 및 버튼 */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px; /* 아이폰 자동 줌 방지용 크기 */
            text-align: center;
            background: white;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #ff5252;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            background-color: #e04040;
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>정부대전청사 공무원노조연합회</h2>
        <p>비밀번호를 입력하여 접속하세요.</p>
        <input type="password" placeholder="비밀번호 입력">
        <button onclick="checkPassword()">확인</button>
    </div>

    <script>
        function checkPassword() {
            // 여기에 비밀번호 확인 로직을 추가할 수 있습니다.
            alert("확인 버튼이 클릭되었습니다.");
        }
    </script>

</body>
</html>
